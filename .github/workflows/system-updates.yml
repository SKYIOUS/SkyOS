name: System Updates Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Update version (e.g., 0.6.0)'
        required: true
        default: '0.6.0'

jobs:
  deploy-update:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '#no-deploy')"
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        run: |
          rustup toolchain install nightly --component rust-src
          rustup default nightly
      
      - name: Build All Components
        run: |
          cargo build -Zbuild-std=core,alloc --target x86_64-sarga.json --release
      
      - name: Prepare Staging Directory
        run: |
          mkdir -p staging/bin staging/libs
      
      - name: Collect Binaries with Hashes
        id: collect
        run: |
          SRC="target/x86_64-sarga/release"
          MANIFEST="staging/update.toml"
          VERSION="${{ github.event.inputs.version }}"
          DATE="$(date +%Y-%m-%d)"
          
          # Write manifest header
          echo "version = \"$VERSION\"" > "$MANIFEST"
          echo "release_date = \"$DATE\"" >> "$MANIFEST"
          echo "" >> "$MANIFEST"
          
          # List of binaries to include in the update
          BINARIES=(
            init sash sargash login-manager login passwd svc vahid
            coreutils/skyos-coreutils
          )
          
          for bin in "${BINARIES[@]}"; do
            name=$(basename "$bin")
            src="$SRC/$name"
            if [ -f "$src" ]; then
              # Copy to staging
              cp "$src" "staging/bin/$name"
              # Compute SHA256
              HASH=$(sha256sum "staging/bin/$name" | cut -d' ' -f1)
              echo "[[files]]" >> "$MANIFEST"
              echo "path = \"/bin/$name\"" >> "$MANIFEST"
              echo "source = \"bin/$name\"" >> "$MANIFEST"
              echo "hash = \"sha256:$HASH\"" >> "$MANIFEST"
              echo "" >> "$MANIFEST"
            fi
          done
          
          echo "Manifest:"
          cat "$MANIFEST"
      
      - name: Deploy to Update Repository
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./staging
          publish_branch: updates-staging
          user_name: 'Skyious Update Bot'
          user_email: 'updates@skyious.org'
