name: System Updates Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Update version (e.g., 0.6.0)'
        required: true
        default: '0.6.0'

jobs:
  deploy-update:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '#no-deploy')"
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      
      - name: Build All Components
        run: |
          chmod +x build.sh
          ./build.sh all
      
      - name: Prepare Update Manifest
        run: |
          echo "version = \"${{ github.event.inputs.version }}\"" > staging/update.toml
          echo "release_date = \"$(date +%Y-%m-%d)\"" >> staging/update.toml
      
      - name: Deploy to Update Repository
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./staging
          publish_branch: updates-staging
          user_name: 'Skyious Update Bot'
          user_email: 'updates@skyious.org'
